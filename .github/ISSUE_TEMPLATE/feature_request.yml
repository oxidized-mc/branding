name: Asset Request
description: Request new brand assets or modifications to existing ones
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion!

  - type: dropdown
    id: type
    attributes:
      label: Request type
      options:
        - New asset (logo, icon, banner, etc.)
        - Modification to existing asset
        - New format / size variant
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What asset do you need and where will it be used?
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: Requirements
      placeholder: |
        Format: SVG / PNG / both
        Size: 128x128, 512x512
        Background: transparent / dark / light
        Usage: README badge, social media, print, etc.
